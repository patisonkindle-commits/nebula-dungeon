name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - run: npm ci
      - run: npx vite build
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
          
      - id: deploy
        uses: actions/deploy-pages@v4
